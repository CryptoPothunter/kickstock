[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "paris"          # zkEVM-safe: no PUSH0 (X Layer)
optimizer = true
optimizer_runs = 200
fuzz = { runs = 1000 }
test = "test"
no_match_path = "lib/**"
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 120
