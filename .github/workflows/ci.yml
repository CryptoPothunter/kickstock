name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: default

jobs:
  contracts:
    name: Contracts (build + test + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-commit
          forge install foundry-rs/forge-std@v1.9.4 --no-commit

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      - name: Coverage
        run: forge coverage

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-commit
          forge install foundry-rs/forge-std@v1.9.4 --no-commit

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: slither . --config-file slither.config.json || true
        continue-on-error: true

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @kickstock/web typecheck

      - name: Build
        run: pnpm --filter @kickstock/web build

  indexer:
    name: Indexer (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @kickstock/indexer typecheck

      - name: Build
        run: pnpm --filter @kickstock/indexer build

  ticker:
    name: Ticker (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @kickstock/ticker typecheck

      - name: Build
        run: pnpm --filter @kickstock/ticker build

  research:
    name: Research (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @kickstock/research typecheck

      - name: Build
        run: pnpm --filter @kickstock/research build
